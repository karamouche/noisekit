<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">
  <!-- Background -->
  <rect width="800" height="160" rx="12" fill="#0f172a"/>

  <!-- Accent line -->
  <rect x="0" y="0" width="4" height="160" rx="2" fill="#3b82f6"/>

  <!-- Title -->
  <text x="40" y="72" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="52" font-weight="700" fill="#f8fafc" letter-spacing="-1">noisekit</text>

  <!-- Tagline -->
  <text x="40" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#94a3b8" letter-spacing="0.2">Noisy speech datasets for ASR robustness</text>

  <!-- Waveform group, right side -->
  <g transform="translate(540, 80)">
    <!-- Bars representing audio degradation levels, styled as a waveform -->
    <rect x="0"   y="-8"  width="6" height="16" rx="3" fill="#3b82f6" opacity="0.9"/>
    <rect x="10"  y="-22" width="6" height="44" rx="3" fill="#3b82f6" opacity="0.85"/>
    <rect x="20"  y="-36" width="6" height="72" rx="3" fill="#3b82f6" opacity="0.8"/>
    <rect x="30"  y="-48" width="6" height="96" rx="3" fill="#3b82f6" opacity="0.75"/>
    <rect x="40"  y="-36" width="6" height="72" rx="3" fill="#60a5fa" opacity="0.7"/>
    <rect x="50"  y="-28" width="6" height="56" rx="3" fill="#93c5fd" opacity="0.6"/>
    <rect x="60"  y="-14" width="6" height="28" rx="3" fill="#bfdbfe" opacity="0.5"/>
    <rect x="70"  y="-6"  width="6" height="12" rx="3" fill="#dbeafe" opacity="0.4"/>
    <!-- Arrow -->
    <text x="90" y="6" font-family="-apple-system, sans-serif" font-size="22" fill="#475569">→</text>
    <!-- Degraded bars -->
    <rect x="116" y="-48" width="6" height="96" rx="3" fill="#f97316" opacity="0.9"/>
    <rect x="126" y="-28" width="6" height="56" rx="3" fill="#fb923c" opacity="0.75"/>
    <rect x="136" y="-38" width="6" height="76" rx="3" fill="#f97316" opacity="0.8"/>
    <rect x="146" y="-14" width="6" height="28" rx="3" fill="#fdba74" opacity="0.6"/>
    <rect x="156" y="-36" width="6" height="72" rx="3" fill="#f97316" opacity="0.7"/>
    <rect x="166" y="-20" width="6" height="40" rx="3" fill="#fb923c" opacity="0.55"/>
    <rect x="176" y="-8"  width="6" height="16" rx="3" fill="#fed7aa" opacity="0.4"/>
    <rect x="186" y="-30" width="6" height="60" rx="3" fill="#f97316" opacity="0.65"/>
  </g>


</svg>
