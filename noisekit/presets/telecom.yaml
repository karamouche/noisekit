name: telecom
description: "G.711-style call: 8 kHz codec + 300–3400 Hz bandpass + low-bitrate MP3 artifacts. PESQ NB target: 2.0–3.5"
transforms:
  - type: Resample
    parameters:
      min_sample_rate: 8000
      max_sample_rate: 8000
    p: 1.0
  - type: HighPassFilter
    parameters:
      min_cutoff_freq: 300.0
      max_cutoff_freq: 300.0
    p: 1.0
  - type: LowPassFilter
    parameters:
      min_cutoff_freq: 3400.0
      max_cutoff_freq: 3400.0
    p: 1.0
  - type: Normalize
    parameters: {}
    p: 1.0
  - type: BitCrush
    parameters:
      min_bit_depth: 8
      max_bit_depth: 8
    p: 1.0
  - type: Mp3Compression
    parameters:
      min_bitrate: 16
      max_bitrate: 32
      backend: lameenc
      preserve_delay: true
    p: 1.0
  - type: Gain
    parameters:
      min_gain_db: -3.0
      max_gain_db: 3.0
    p: 0.5
  - type: Resample
    parameters:
      min_sample_rate: 16000
      max_sample_rate: 16000
    p: 1.0
