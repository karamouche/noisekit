name: noise
description: "Real-world ambient background noise mixed at variable SNR (5-15 dB). Requires --noise-dir."
transforms:
  - type: Normalize
    parameters: {}
    p: 1.0
  - type: AddBackgroundNoise
    parameters:
      sounds_path: ${NOISE_DIR}
      min_snr_db: 5.0
      max_snr_db: 15.0
    p: 1.0
  - type: LowPassFilter
    parameters:
      min_cutoff_freq: 8000.0
      max_cutoff_freq: 12000.0
    p: 1.0
