name: transmission_dropout
description: "Simulated packet loss: 1–3 silent dropout windows per utterance."
transforms:
  - type: TimeMask
    parameters:
      min_band_part: 0.02
      max_band_part: 0.06
      fade_duration: 0.002
    p: 1.0
  - type: TimeMask
    parameters:
      min_band_part: 0.02
      max_band_part: 0.06
      fade_duration: 0.002
    p: 0.8
  - type: TimeMask
    parameters:
      min_band_part: 0.02
      max_band_part: 0.06
      fade_duration: 0.002
    p: 0.5
