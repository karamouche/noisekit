name: clipping
description: "Amplitude clipping simulating microphone overload or ADC saturation (10–25% of peak samples)."
transforms:
  - type: ClippingDistortion
    parameters:
      min_percentile_threshold: 10
      max_percentile_threshold: 25
    p: 1.0
  - type: Gain
    parameters:
      min_gain_db: -3.0
      max_gain_db: 3.0
    p: 0.5
