name: noisy_environment
description: "Real-world ambient noise (cafe/street/office) mixed in at variable SNR. Requires --noise-dir. PESQ WB target: 1.0–2.5"
transforms:
  - type: Normalize
    parameters: {}
    p: 1.0
  - type: AddBackgroundNoise
    parameters:
      sounds_path: ${NOISE_DIR}
      min_snr_db: 5.0
      max_snr_db: 15.0
    p: 1.0
  - type: LowPassFilter
    parameters:
      min_cutoff_freq: 8000.0
      max_cutoff_freq: 12000.0
    p: 1.0
