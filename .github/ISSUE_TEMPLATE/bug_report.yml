name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command run
      description: The exact `noisekit` command that triggered the bug.
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Error / traceback
      render: text

  - type: input
    id: version
    attributes:
      label: noisekit version
      description: "`uv run noisekit --version` or git SHA"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: "`python --version`"
